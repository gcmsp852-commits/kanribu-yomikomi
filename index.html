<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QRツイン リーダー</title>

  <meta name="apple-mobile-web-app-title" content="QRツイン">
  <meta name="application-name" content="QRツイン">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#121212">

  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <!-- ZXing UMD -->
  <script src="https://unpkg.com/@zxing/library@0.21.0/umd/index.min.js"></script>
  <!-- 管理部抽出パッチ -->
  <script src="./zxing_mgmt16_patch.js"></script>

  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      margin:0; padding:0; background:#121212; color:#fff; text-align:center; }
    h2 { margin:15px 0; font-size:1.2rem; }

    #startScreen, #resultScreen { padding:20px; margin-top:50px; }
    #resultScreen { display:none; }

    .camera-container { position:relative; width:100%; max-width:600px; margin:0 auto; background:#000; display:none; }
    video { width:100%; display:block; object-fit:cover; }

    .status-panel { padding:15px; background:#1e1e1e; border-top:1px solid #333; text-align:left;
      max-width:600px; margin:0 auto; display:none; }

    .qr-result { margin-bottom:10px; padding:10px; border-radius:8px; background:#2c2c2c; word-break:break-all; }
    .qr-1 { border-left:5px solid #00E676; }

    .mgmt-box { margin-top:10px; padding:10px; border-radius:8px; background:#232323; border:1px solid #333; }
    .mgmt-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .mgmt-pill { padding:6px 10px; border-radius:999px; background:#2c2c2c; border:1px solid #3a3a3a; font-size:0.9rem; }
    .mgmt-pill b { color:#00E676; }

    button{ width:100%; max-width:300px; padding:15px; font-size:1.1rem; font-weight:bold;
      background:#6200EE; color:#fff; border:none; border-radius:8px; cursor:pointer; margin-top:10px; }
    button:disabled{ background:#555; cursor:not-allowed; color:#aaa; }

    #startBtn{ background:#81C784; color:#121212; }
    #startBtn:active{ background:#66BB6A; }
    #stopBtn{ background:#03DAC6; color:#000; display:none; }
    #stopBtn:active{ background:#018786; }
  </style>
</head>
<body>

  <h2>📱 QRツイン リーダー</h2>

  <div id="startScreen">
    <p style="color:#aaa; font-size:0.9rem; margin-bottom:20px;">
      まずは第1QRの管理部16bitを表示できるところまで到達します。
    </p>
    <button id="startBtn" onclick="startApp()">📷 カメラを起動する</button>
    <button id="stopBtn" onclick="stopApp()">⛔ 停止</button>
  </div>

  <div class="camera-container" id="cameraContainer">
    <video id="video" playsinline autoplay muted></video>
  </div>

  <div class="status-panel" id="statusPanel">
    <div id="detectorInfo" style="font-size:0.8rem; color:#aaa; margin-bottom:10px;">読取エンジン準備中...</div>
    <div id="logBox" style="font-size:12px;color:#9fb0c7;white-space:pre-wrap;line-height:1.35;margin-bottom:10px;"></div>

    <div class="qr-result qr-1">
      <strong>第1QR（テキスト）:</strong> <span id="text1">未検出</span>
    </div>

    <div class="mgmt-box">
      <div style="font-weight:bold; margin-bottom:6px;">🔐 第1QR 管理部（16bit）</div>
      <div class="mgmt-row">
        <div class="mgmt-pill">bits: <b id="mgmtBits1">----------------</b></div>
        <div class="mgmt-pill">hex: <b id="mgmtHex1">----</b></div>
        <div class="mgmt-pill">appEnc推定: <b id="appEnc1">?</b></div>
      </div>
      <div style="color:#aaa; font-size:0.8rem; margin-top:6px;">
        ※appEnc推定は暫定（ビット位置確定後に修正）
      </div>
    </div>
  </div>

<script>
  const video = document.getElementById('video');

  let codeReader = null;
  let controls = null;
  let running = false;

  function log(msg){
    const el = document.getElementById('logBox');
    const t = new Date().toLocaleTimeString();
    if (el) el.textContent = `[${t}] ${msg}\n` + el.textContent;
    console.log(msg);
  }

  async function startApp(){
    const startBtn = document.getElementById('startBtn');
    const stopBtn  = document.getElementById('stopBtn');
    startBtn.disabled = true;
    startBtn.innerText = "準備中...";

    try{
      if (!window.isSecureContext) {
        log("❌ isSecureContext=false（https または localhost 以外）");
        alert("カメラは https（または http://localhost）でないと動きません。");
        startBtn.disabled = false;
        startBtn.innerText = "📷 カメラを起動する";
        return;
      }

      if (typeof ZXing === 'undefined') {
        log("❌ ZXing が未定義（読み込み失敗）");
        throw new Error("ZXing library load failed");
      }

      // UMDで存在するクラスを使う
      if (!ZXing.BrowserQRCodeReader) {
        log("❌ ZXing.BrowserQRCodeReader が見つかりません（UMD想定外）");
        throw new Error("BrowserQRCodeReader not found");
      }

      codeReader = new ZXing.BrowserQRCodeReader();
      document.getElementById('detectorInfo').innerText = "🐢 エンジン: BrowserQRCodeReader + 管理部16bit抽出パッチ";
      log("ZXing OK: BrowserQRCodeReader 準備完了");

      // UI表示
      document.getElementById('cameraContainer').style.display = 'block';
      document.getElementById('statusPanel').style.display = 'block';
      stopBtn.style.display = 'inline-block';

      running = true;

      log("decodeFromVideoDevice 開始（背面カメラ ideal）");

      // deviceId = null で背面カメラを選びやすい（ライブラリが選択）
      controls = await codeReader.decodeFromVideoDevice(
        null,
        video,
        (result, err, ctrl) => {
          // ctrl はライブラリ側で渡されることがあるが、こちらでも保持済み
          if (!running) return;

          if (result) {
            onDecoded(result);
          } else if (err) {
            // NotFoundException は「見つからない」だけなので無視
            // それ以外はログに出す
            const name = err && err.name ? err.name : "";
            if (name && name !== "NotFoundException") {
              log("decode err: " + name + " " + (err.message || String(err)));
            }
          }
        }
      );

      log("decodeFromVideoDevice: controls 取得");
      startBtn.innerText = "📷 起動中";
    } catch(e){
      log("startApp 例外: " + (e && e.message ? e.message : String(e)));
      alert("起動中にエラー: " + (e && e.message ? e.message : String(e)));
      startBtn.disabled = false;
      startBtn.innerText = "📷 カメラを起動する";
    }
  }

  function stopApp(){
    running = false;
    try{
      if (controls && controls.stop) {
        controls.stop();
        log("controls.stop() 実行");
      }
    } catch(e){
      log("stop error: " + (e.message || String(e)));
    }

    try{
      if (codeReader && codeReader.reset) {
        codeReader.reset();
        log("codeReader.reset() 実行");
      }
    } catch(e){
      log("reset error: " + (e.message || String(e)));
    }

    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').innerText = "📷 カメラを起動する";
    document.getElementById('stopBtn').style.display = 'none';
  }

  function onDecoded(result){
    // テキスト表示
    const text = result.getText ? result.getText() : (result.text || "");
    document.getElementById('text1').innerText = text || "(no text)";
    log("✅ decoded: " + (text ? text.slice(0,80) : "(empty)"));

    // 管理部抽出：dimensionが取れないので version推定は省略（パッチはversion未指定でも動く）
    let mgmt = null;
    try{
      mgmt = (result.getManagement16 ? result.getManagement16(null) : null);
    } catch(e){
      mgmt = { ok:false, reason:String(e && e.message ? e.message : e) };
    }

    if (mgmt && mgmt.ok){
      document.getElementById('mgmtBits1').innerText = mgmt.mgmtBits;
      document.getElementById('mgmtHex1').innerText  = "0x" + mgmt.mgmt16.toString(16).padStart(4,'0');

      // 暫定：bit15 を appEnc と仮表示（仕様確定後に変更）
      const appEnc = ((mgmt.mgmt16 >>> 15) & 1) ? "ON(暫定)" : "OFF(暫定)";
      document.getElementById('appEnc1').innerText = appEnc;

      log("mgmt16 ok: " + mgmt.mgmtBits + " / 0x" + mgmt.mgmt16.toString(16).padStart(4,'0'));
    } else {
      document.getElementById('mgmtBits1').innerText = "取得失敗";
      document.getElementById('mgmtHex1').innerText  = "----";
      document.getElementById('appEnc1').innerText   = "?";
      log("mgmt16 fail: " + (mgmt ? mgmt.reason : "null"));
    }
  }
</script>
</body>
</html>
