<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QRツイン リーダー</title>

  <meta name="apple-mobile-web-app-title" content="QRツイン">
  <meta name="application-name" content="QRツイン">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#121212">

  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <!-- ZXing -->
  <script src="https://unpkg.com/@zxing/library@0.21.0/umd/index.min.js"></script>
  <!-- ★追加：管理部16bit抽出パッチ（同階層に zxing_mgmt16_patch.js を置く） -->
  <script src="./zxing_mgmt16_patch.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0; padding: 0; background-color: #121212; color: #ffffff; text-align: center;
    }
    h2 { margin: 15px 0; font-size: 1.2rem; }

    #startScreen, #resultScreen { padding: 20px; margin-top: 50px; }
    #resultScreen { display: none; }

    .camera-container {
      position: relative; width: 100%; max-width: 600px; margin: 0 auto; background: #000; display: none;
    }
    video { width: 100%; display: block; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

    .status-panel {
      padding: 15px; background: #1e1e1e; border-top: 1px solid #333;
      text-align: left; max-width: 600px; margin: 0 auto; display: none;
    }

    .qr-result { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: #2c2c2c; word-break: break-all; }
    .qr-1 { border-left: 5px solid #00E676; }
    .qr-2 { border-left: 5px solid #29B6F6; }

    /* ★追加：管理部表示の見た目 */
    .mgmt-box { margin-top: 10px; padding: 10px; border-radius: 8px; background: #232323; border: 1px solid #333; }
    .mgmt-row { display:flex; gap:10px; flex-wrap: wrap; align-items: center; }
    .mgmt-pill { padding: 6px 10px; border-radius: 999px; background: #2c2c2c; border: 1px solid #3a3a3a; font-size: 0.9rem; }
    .mgmt-pill b { color:#00E676; }

    button {
      width: 100%; max-width: 300px; padding: 15px; font-size: 1.1rem; font-weight: bold;
      background: #6200EE; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;
    }
    button:disabled { background: #555; cursor: not-allowed; color: #aaa; }

    #startBtn { background: #81C784; color: #121212; }
    #startBtn:active { background: #66BB6A; }

    #backBtn { background: #03DAC6; color: #000; margin-top: 30px; }
    #backBtn:active { background: #018786; }
  </style>
</head>
<body>

  <h2>📱 QRツイン リーダー</h2>

  <div id="startScreen">
    <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 20px;">
      2つのQRコードを同時に、または連続して読み取ります。
    </p>
    <button id="startBtn" onclick="startApp()">📷 カメラを起動する</button>
  </div>

  <div class="camera-container" id="cameraContainer">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlayCanvas"></canvas>
  </div>

  <div class="status-panel" id="statusPanel">
    <div id="detectorInfo" style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">読取エンジン準備中...</div>

    <!-- ★追加：ログ欄（原因切り分け用） -->
    <div id="logBox" style="font-size:12px;color:#9fb0c7;white-space:pre-wrap;line-height:1.35;margin-bottom:10px;"></div>

    <div class="qr-result qr-1">
      <strong>1個目:</strong> <span id="text1">未検出</span>
    </div>

    <!-- ★追加：第1QR 管理部表示 -->
    <div class="mgmt-box">
      <div style="font-weight:bold; margin-bottom:6px;">🔐 第1QR 管理部（16bit）</div>
      <div class="mgmt-row">
        <div class="mgmt-pill">bits: <b id="mgmtBits1">----------------</b></div>
        <div class="mgmt-pill">hex: <b id="mgmtHex1">----</b></div>
        <div class="mgmt-pill">appEnc推定: <b id="appEnc1">?</b></div>
      </div>
      <div style="color:#aaa; font-size:0.8rem; margin-top:6px;">
        ※appEnc推定は「どのビットがアプリ暗号化か」を後で確定したら正確にします（今は暫定表示）。
      </div>
    </div>

    <div class="qr-result qr-2" style="margin-top:10px;">
      <strong>2個目:</strong> <span id="text2">未検出</span>
    </div>
  </div>

  <div id="resultScreen">
    <h3 style="color: #00E676; margin-bottom: 20px;">✅ 読み取り完了！</h3>
    <div class="qr-result qr-1" style="text-align: left;">
      <strong>1個目:</strong><br> <span id="finalText1"></span>
    </div>
    <div class="qr-result qr-2" style="text-align: left;">
      <strong>2個目:</strong><br> <span id="finalText2"></span>
    </div>
    <button id="backBtn" onclick="goBack()">🔙 もとのカメラ画面に戻る</button>
  </div>

<script>
  const video = document.getElementById('video');
  const overlayCanvas = document.getElementById('overlayCanvas');
  const ctx = overlayCanvas.getContext('2d');

  const zxingCanvas = document.createElement('canvas');
  const zxingCtx = zxingCanvas.getContext('2d', { willReadFrequently: true });

  let isProcessing = false;
  let isScanning = false;
  let lastDetectTime = 0;
  const SCAN_INTERVAL_MS = 200;

  let zxingMultiReader = null;

  let firstQR = null;
  let secondQR = null;

  // ★追加：ログ関数
  function log(msg){
    const el = document.getElementById('logBox');
    const t = new Date().toLocaleTimeString();
    if (el) el.textContent = `[${t}] ${msg}\n` + el.textContent;
    console.log(msg);
  }

  // ★変更：例外でも必ずボタン復帰＋ログ
  async function startApp() {
    const startBtn = document.getElementById('startBtn');
    startBtn.disabled = true;
    startBtn.innerText = "準備中...";

    try {
      log("startApp: initEngines 開始");
      await initEngines();
      log("startApp: initEngines 完了");

      log("startApp: startCamera 開始");
      const success = await startCamera();
      log("startApp: startCamera 結果 = " + success);

      if (success) {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('cameraContainer').style.display = 'block';
        document.getElementById('statusPanel').style.display = 'block';
        log("UI: cameraContainer/statusPanel 表示");
      } else {
        startBtn.disabled = false;
        startBtn.innerText = "📷 カメラを起動する";
        log("startCamera 失敗: ボタン復帰");
      }
    } catch (e) {
      log("startApp 例外: " + (e && e.message ? e.message : String(e)));
      alert("起動中にエラー: " + (e && e.message ? e.message : String(e)));
      startBtn.disabled = false;
      startBtn.innerText = "📷 カメラを起動する";
    }
  }

  async function initEngines() {
    // ステップ1では rawBytes が必要 → ZXing固定
    if (typeof ZXing !== 'undefined') {
      zxingMultiReader = new ZXing.qrcode.QRCodeMultiReader();
      document.getElementById('detectorInfo').innerText = "🐢 エンジン: ZXing + 管理部16bit抽出パッチ";
      log("ZXing 読み込みOK");
    } else {
      log("❌ ZXing が未定義（読み込み失敗）");
      alert("ZXingライブラリの読み込みに失敗しました。再読み込みしてください。");
    }
  }

  // ★変更：セキュアコンテキスト/権限/タイムアウト切り分け
  async function startCamera() {
    try {
      // https / localhost 以外を即検出
      if (!window.isSecureContext) {
        log("❌ isSecureContext=false（https または localhost 以外）");
        alert("カメラは https（または http://localhost）でないと動きません。");
        return false;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        log("❌ getUserMedia が利用不可");
        alert("このブラウザはカメラAPI(getUserMedia)に対応していません。");
        return false;
      }

      log("getUserMedia 要求: facingMode=environment");
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } },
        audio: false
      });
      log("getUserMedia 成功");

      video.srcObject = stream;

      // onloadedmetadata が来ない端末があるので timeout 付き
      await new Promise((resolve, reject) => {
        const to = setTimeout(() => reject(new Error("video metadata timeout")), 3000);
        video.onloadedmetadata = () => {
          clearTimeout(to);
          resolve();
        };
      });
      log(`video metadata: ${video.videoWidth}x${video.videoHeight}`);

      try {
        await video.play();
        log("video.play() 成功");
      } catch (e) {
        log("⚠️ video.play() 失敗: " + (e && e.message ? e.message : String(e)));
        // stream は来ている場合があるので継続
      }

      isScanning = true;
      requestAnimationFrame(scanLoop);
      log("scanLoop 開始");
      return true;

    } catch (err) {
      const name = err && err.name ? err.name : "";
      const msg  = err && err.message ? err.message : String(err);
      log("❌ startCamera エラー: " + name + " " + msg);

      if (name === "NotAllowedError") {
        alert("カメラ権限が拒否されています。ブラウザ設定でカメラを許可してください。");
      } else if (name === "NotFoundError") {
        alert("カメラが見つかりません。端末にカメラがあるか確認してください。");
      } else if (name === "NotReadableError") {
        alert("他アプリがカメラを使用中の可能性があります。カメラを使うアプリを閉じてください。");
      } else {
        alert("カメラを起動できませんでした。\nエラー: " + msg);
      }
      return false;
    }
  }

  function getCenter(points) {
    if (!points || points.length === 0) return { x: 0, y: 0 };
    let sumX = 0, sumY = 0;
    points.forEach(p => { sumX += p.x; sumY += p.y; });
    return { x: sumX / points.length, y: sumY / points.length };
  }

  function getDistance(p1, p2) {
    return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
  }

  async function scanLoop() {
    if (!isScanning) return;

    if (video.videoWidth && overlayCanvas.width !== video.videoWidth) {
      overlayCanvas.width = video.videoWidth;
      overlayCanvas.height = video.videoHeight;
      log(`canvas resize: ${overlayCanvas.width}x${overlayCanvas.height}`);
    }

    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

    if (firstQR) drawBoundingBox(firstQR.points, '#00E676');
    if (secondQR) drawBoundingBox(secondQR.points, '#29B6F6');

    const now = Date.now();
    if (!isProcessing && now - lastDetectTime > SCAN_INTERVAL_MS && video.readyState >= 2) {
      isProcessing = true;
      lastDetectTime = now;
      let detectedItems = [];

      try {
        if (zxingMultiReader) {
          zxingCanvas.width = overlayCanvas.width;
          zxingCanvas.height = overlayCanvas.height;
          zxingCtx.drawImage(video, 0, 0, zxingCanvas.width, zxingCanvas.height);

          const luminanceSource = new ZXing.HTMLCanvasElementLuminanceSource(zxingCanvas);
          const binaryBitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminanceSource));
          const hints = new Map();
          hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.QR_CODE]);

          const results = zxingMultiReader.decodeMultiple(binaryBitmap, hints);

          // BitMatrixサイズからversion推定用に dimension を取る
          const dim = binaryBitmap.getBlackMatrix().getWidth();

          detectedItems = results.map(r => {
            const pts = r.getResultPoints().map(p => ({ x: p.getX(), y: p.getY() }));
            let mgmt = null;
            try {
              mgmt = (r.getManagement16 ? r.getManagement16(dim) : null);
            } catch (e) {
              mgmt = { ok:false, reason:String(e && e.message ? e.message : e) };
            }
            return {
              text: r.getText(),
              points: pts,
              center: getCenter(pts),
              mgmt
            };
          });
        }
      } catch (err) {
        // 読取失敗は次フレームへ（必要ならログを出す）
        // log("decode err: " + (err && err.message ? err.message : String(err)));
      }

      processDetections(detectedItems);
      isProcessing = false;
    }

    if (firstQR && secondQR) {
      showResultScreen();
      isScanning = false;
      return;
    }

    requestAnimationFrame(scanLoop);
  }

  function processDetections(items) {
    if (items.length === 0) return;

    if (items.length >= 2) {
      if (!firstQR) {
        firstQR = items[0];
        secondQR = items[1];
        updateUI();
        return;
      }
      if (firstQR && !secondQR) {
        const dist0 = getDistance(firstQR.center, items[0].center);
        const dist1 = getDistance(firstQR.center, items[1].center);
        if (dist0 > dist1) {
          secondQR = items[0];
          firstQR = items[1];
        } else {
          secondQR = items[1];
          firstQR = items[0];
        }
        updateUI();
        return;
      }
    }

    if (items.length === 1) {
      const item = items[0];

      if (!firstQR) {
        firstQR = item;
        updateUI();
      } else if (!secondQR) {
        if (item.text !== firstQR.text) {
          secondQR = item;
          updateUI();
        } else {
          const dist = getDistance(firstQR.center, item.center);
          const qrSize = getDistance(item.points[0], item.points[1]);
          const distanceThreshold = Math.min(overlayCanvas.width * 0.1, qrSize * 0.45);

          if (dist > distanceThreshold) {
            secondQR = item;
            updateUI();
          } else {
            firstQR.points = item.points;
            firstQR.center = item.center;
          }
        }
      }
    }
  }

  function updateUI() {
    if (firstQR) document.getElementById('text1').innerText = firstQR.text;
    if (secondQR) document.getElementById('text2').innerText = secondQR.text;

    // 第1QR 管理部表示
    if (firstQR && firstQR.mgmt) {
      const m = firstQR.mgmt;
      if (m.ok) {
        document.getElementById('mgmtBits1').innerText = m.mgmtBits;
        document.getElementById('mgmtHex1').innerText = "0x" + m.mgmt16.toString(16).padStart(4,'0');

        // 暫定：bit15 を appEnc と仮表示（仕様確定後に正しいビットに変更）
        const appEnc = ((m.mgmt16 >>> 15) & 1) ? "ON(暫定)" : "OFF(暫定)";
        document.getElementById('appEnc1').innerText = appEnc;
      } else {
        document.getElementById('mgmtBits1').innerText = "取得失敗";
        document.getElementById('mgmtHex1').innerText = "----";
        document.getElementById('appEnc1').innerText = "?";
      }
    }
  }

  function formatResultText(text) {
    if (/^https?:\/\//i.test(text)) {
      return `<a href="${text}" target="_blank" rel="noopener noreferrer" style="color: #03DAC6; text-decoration: underline; font-weight: bold;">${text}</a>`;
    }
    const div = document.createElement('div');
    div.innerText = text;
    return div.innerHTML;
  }

  function showResultScreen() {
    if (navigator.vibrate) navigator.vibrate([40, 30, 40]);

    document.getElementById('cameraContainer').style.display = 'none';
    document.getElementById('statusPanel').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';

    document.getElementById('finalText1').innerHTML = formatResultText(firstQR.text);
    document.getElementById('finalText2').innerHTML = formatResultText(secondQR.text);
  }

  function goBack() {
    firstQR = null;
    secondQR = null;

    document.getElementById('text1').innerText = "未検出";
    document.getElementById('text2').innerText = "未検出";

    document.getElementById('mgmtBits1').innerText = "----------------";
    document.getElementById('mgmtHex1').innerText = "----";
    document.getElementById('appEnc1').innerText = "?";

    document.getElementById('resultScreen').style.display = 'none';
    document.getElementById('cameraContainer').style.display = 'block';
    document.getElementById('statusPanel').style.display = 'block';

    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
    isScanning = true;
    requestAnimationFrame(scanLoop);
    log("goBack: scanLoop 再開");
  }

  function drawBoundingBox(points, color) {
    if (!points || points.length < 3) return;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.closePath();
    ctx.lineWidth = 6;
    ctx.strokeStyle = color;
    ctx.stroke();
    ctx.fillStyle = color + '44';
    ctx.fill();
  }
</script>
</body>
</html>
